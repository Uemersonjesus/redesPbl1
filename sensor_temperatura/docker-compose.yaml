services:
  sensor_temperatura:
    build:
      context: .
      dockerfile: Dockerfile
    # Sem nome fixo de container: permite rodar N réplicas com
    #   docker compose up --scale sensor_temperatura=3 -d
    restart: unless-stopped
    environment:
      # IP ou hostname do computador que roda o integrador na LAN.
      # Port forwarding já expõe :5000/udp no roteador/host.
      - INTEGRADOR_HOST=${INTEGRADOR_HOST}
    network_mode: host   # usa a rede do host → alcança a LAN diretamente
 